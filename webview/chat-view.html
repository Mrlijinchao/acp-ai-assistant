<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

     <!-- 移除原来的 marked，改用 markdown-it -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.0.0/dist/markdown-it.min.js"></script>
    
    <!-- highlight.js 用于代码高亮 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <!-- 可选：添加更多语言支持 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/typescript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/css.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--vscode-font-family);
            background: var(--vscode-editor-background);
            color: var(--vscode-editor-foreground);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        button {
            padding: 4px 12px;
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: var(--vscode-button-hoverBackground); }
        .status-bar {
            padding: 6px 8px;
            background: var(--vscode-statusBar-background);
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .status-dot.stopped { background: #e74c3c; }
        .status-dot.running { background: #2ecc71; animation: pulse 1.5s infinite; }
        .status-dot.starting { background: #f39c12; animation: pulse 0.8s infinite;}
        .status-dot.error { background: #e74c3c; animation: none;opacity: 0.7;}
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .message {
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-header {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--vscode-descriptionForeground);
        }
        .message-content {
            padding: 8px 12px;
            border-radius: 8px;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        .message.user .message-content {
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
        }
        .message.assistant .message-content {
            background: var(--vscode-editor-inactiveSelectionBackground);
        }
        .message.system .message-content {
            background: var(--vscode-terminal-ansiYellow);
            color: black;
            font-size: 12px;
        }
        .input-container {
            padding: 12px;
            border-top: 1px solid var(--vscode-panel-border);
            display: flex;
            gap: 8px;
        }
        textarea {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--vscode-input-border);
            background: var(--vscode-input-background);
            color: var(--vscode-input-foreground);
            border-radius: 4px;
            resize: vertical;
            font-family: inherit;
        }
        textarea:disabled, button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
         /* 工具调用样式 - 可折叠版本 */
        .tool-call {
            margin: 4px 0 8px 0;
            background: var(--vscode-editor-background);
            border: 1px solid var(--vscode-panel-border);
            border-radius: 6px;
            font-size: 12px;
            transition: all 0.2s ease;
            overflow: hidden;
        }

        .tool-call.executing {
            border-left: 3px solid #f39c12;
        }

        .tool-call.completed {
            border-left: 3px solid #2ecc71;
        }

        .tool-call.failed {
            border-left: 3px solid #e74c3c;
        }

        .tool-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            cursor: pointer;
            user-select: none;
            background: var(--vscode-sideBar-background);
            transition: background 0.2s;
        }

        .tool-header:hover {
            background: var(--vscode-list-hoverBackground);
        }

        .tool-icon {
            font-size: 13px;
        }

        .tool-name {
            font-family: monospace;
            font-weight: 600;
            color: var(--vscode-foreground);
            font-size: 12px;
        }

        .tool-status {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            background: var(--vscode-badge-background);
            color: var(--vscode-badge-foreground);
        }

        .tool-status.executing {
            background: #f39c12;
            color: #000;
        }

        .tool-status.completed {
            background: #2ecc71;
            color: #fff;
        }

        .tool-status.failed {
            background: #e74c3c;
            color: #fff;
        }

        .tool-toggle {
            margin-left: auto;
            font-size: 11px;
            transition: transform 0.2s;
        }

        .tool-toggle.collapsed {
            transform: rotate(-90deg);
        }

        .tool-details {
            padding: 0;
            max-height: 500px;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            border-top: 1px solid var(--vscode-panel-border);
        }

        .tool-details.collapsed {
            max-height: 0;
            border-top: none;
        }

        .tool-args, .tool-result {
            padding: 6px 10px;
        }

        .tool-args {
            background: var(--vscode-textCodeBlock-background);
            border-bottom: 1px solid var(--vscode-panel-border);
        }

        .tool-args pre, .tool-result pre {
            margin: 4px 0;
            padding: 6px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            overflow-x: auto;
            font-size: 11px;
            font-family: monospace;
        }

        .tool-result {
            background: var(--vscode-editor-background);
        }

        .result-header {
            font-size: 11px;
            margin-bottom: 4px;
            color: var(--vscode-descriptionForeground);
        }

        .tool-error {
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
            padding: 6px;
            border-radius: 4px;
        }
        
        /* 工具调用容器 - 放在回答前面 */
        .tool-calls-container {
            margin-bottom: 12px;
        }

    /* 添加代码块样式 */
     /* 优化代码块样式 */
        .message-content pre {
            background: #1e1e1e;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 10px 0;
        }
        
        .message-content pre code {
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
        }
        
        /* 行内代码样式 */
        .message-content code:not(pre code) {
            background: var(--vscode-textCodeBlock-background);
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 0.9em;
            color: #e06c75;
        }
        
        /* 表格样式优化 */
        .message-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 10px 0;
        }
        
        .message-content th,
        .message-content td {
            border: 1px solid var(--vscode-panel-border);
            padding: 8px 12px;
            text-align: left;
        }
        
        .message-content th {
            background: var(--vscode-editor-inactiveSelectionBackground);
            font-weight: 600;
        }
        
        /* 引用块样式 */
        .message-content blockquote {
            border-left: 4px solid var(--vscode-foreground);
            margin: 10px 0;
            padding: 8px 16px;
            background: var(--vscode-textCodeBlock-background);
            color: var(--vscode-descriptionForeground);
        }
        
        /* 列表样式 */
        .message-content ul,
        .message-content ol {
            margin: 8px 0;
            padding-left: 24px;
        }
        
        /* 链接样式 */
        .message-content a {
            color: var(--vscode-textLink-foreground);
            text-decoration: none;
        }
        
        .message-content a:hover {
            text-decoration: underline;
        }
        
        /* 任务列表样式 */
        .message-content input[type="checkbox"] {
            margin-right: 8px;
            vertical-align: middle;
        }

        .agent-selector { margin-bottom: 10px; padding: 8px; background: var(--vscode-editor-background); border: 1px solid var(--vscode-panel-border); border-radius: 4px; }
        .agent-selector select { width: 100%; padding: 6px; background: var(--vscode-dropdown-background); color: var(--vscode-dropdown-foreground); border: 1px solid var(--vscode-dropdown-border); border-radius: 4px; font-family: inherit; }
        .agent-selector label { display: block; margin-bottom: 4px; font-size: 12px; color: var(--vscode-descriptionForeground); }

        /* 自动批准横幅 - 显示在工具调用区域 */
        .auto-approve-banner {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            margin: 8px 0;
            background: rgba(46, 204, 113, 0.15);
            border: 1px solid #2ecc71;
            border-radius: 6px;
            font-size: 12px;
            color: #2ecc71;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auto-approve-banner .banner-icon {
            font-size: 14px;
        }

        .auto-approve-banner .banner-text {
            flex: 1;
            font-weight: 500;
        }

        .auto-approve-banner .banner-disable-btn {
            background: none;
            border: none;
            color: #2ecc71;
            cursor: pointer;
            font-size: 14px;
            padding: 0 4px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .auto-approve-banner .banner-disable-btn:hover {
            opacity: 1;
        }

        /* 工具调用中的审批标记 */
        .approval-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 6px;
        }

        .approval-badge.auto-approved {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        .approval-badge.manual-approved {
            background: rgba(52, 152, 219, 0.2);
            color: #3498db;
        }

        /* 状态栏审批状态 */
        .approval-status {
            margin-left: auto;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #autoApproveStatus {
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
        }

        #autoApproveStatus.auto-approve-enabled {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        #autoApproveStatus.auto-approve-disabled {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }

        #disableAutoApprove {
            font-size: 10px;
            padding: 2px 8px;
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #disableAutoApprove:hover {
            background: rgba(231, 76, 60, 0.25);
        }

        /* 会话管理样式 */
        .session-manager {
            border-bottom: 1px solid var(--vscode-panel-border);
            background: var(--vscode-sideBar-background);
            flex-shrink: 0;
        }
        
        .session-header {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            cursor: pointer;
            user-select: none;
        }
        
        .session-header:hover {
            background: var(--vscode-list-hoverBackground);
        }
        
        .session-header .toggle-icon {
            font-size: 10px;
            transition: transform 0.2s;
            color: var(--vscode-descriptionForeground);
        }
        
        .session-header .toggle-icon.collapsed {
            transform: rotate(-90deg);
        }
        
        .session-header h3 {
            margin: 0;
            font-size: 11px;
            font-weight: 600;
            flex: 1;
            color: var(--vscode-descriptionForeground);
        }
        
        .session-header .session-count {
            font-size: 10px;
            color: var(--vscode-descriptionForeground);
            background: var(--vscode-badge-background);
            padding: 0 6px;
            border-radius: 8px;
        }
        
        .session-header .session-actions {
            display: flex;
            gap: 4px;
        }
        
        .session-header .session-actions button {
            padding: 1px 8px;
            font-size: 11px;
        }
        
        /* 会话列表 - 可滚动 */
        .session-list-wrapper {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        
        .session-list-wrapper.expanded {
            max-height: 200px;
        }
        
        .session-list {
            max-height: 180px;
            overflow-y: auto;
            padding: 2px 4px;
        }
        
        .session-list::-webkit-scrollbar {
            width: 4px;
        }
        
        .session-list::-webkit-scrollbar-thumb {
            background: var(--vscode-scrollbarSlider-background);
            border-radius: 2px;
        }
        
        .session-list::-webkit-scrollbar-thumb:hover {
            background: var(--vscode-scrollbarSlider-hoverBackground);
        }
        
        .session-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 3px 6px;
            border-radius: 3px;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 12px;
        }
        
        .session-item:hover {
            background: var(--vscode-list-hoverBackground);
        }
        
        .session-item.active {
            background: var(--vscode-list-activeSelectionBackground);
            color: var(--vscode-list-activeSelectionForeground);
        }
        
        .session-item .session-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 12px;
        }
        
        .session-item .session-info {
            font-size: 10px;
            color: var(--vscode-descriptionForeground);
            flex-shrink: 0;
        }
        
        .session-item .session-delete {
            display: none;
            padding: 0 4px;
            font-size: 12px;
            background: none;
            border: none;
            color: var(--vscode-errorForeground);
            cursor: pointer;
            opacity: 0.6;
            flex-shrink: 0;
            line-height: 1;
        }
        
        .session-item:hover .session-delete {
            display: inline-block;
        }
        
        .session-item .session-delete:hover {
            opacity: 1;
        }
        
        .session-rename-input {
            flex: 1;
            padding: 1px 4px;
            font-size: 12px;
            background: var(--vscode-input-background);
            color: var(--vscode-input-foreground);
            border: 1px solid var(--vscode-input-border);
            border-radius: 2px;
            min-width: 0;
        }
        
        .session-rename-input:focus {
            outline: none;
            border-color: var(--vscode-focusBorder);
        }
        
        .session-empty {
            padding: 6px 8px;
            color: var(--vscode-descriptionForeground);
            font-size: 11px;
            text-align: center;
        }

        /* 新增：修改管理面板样式 */
        .changes-panel {
            border-top: 1px solid var(--vscode-panel-border);
            background: var(--vscode-sideBar-background);
            flex-shrink: 0;
            max-height: 300px;
            overflow: auto;
            padding: 8px;
            display: none;
        }
        .changes-panel.visible {
            display: block;
        }
        .changes-panel .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 4px 8px;
            background: var(--vscode-editor-background);
            border-radius: 4px;
        }
        .changes-panel .panel-header h4 {
            margin: 0;
            font-size: 12px;
            font-weight: 600;
        }
        .changes-panel .panel-actions {
            display: flex;
            gap: 4px;
        }
        .changes-panel .panel-actions button {
            padding: 2px 10px;
            font-size: 11px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .changes-panel .panel-actions .btn-commit-all {
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
        }
        .changes-panel .panel-actions .btn-rollback-all {
            background: var(--vscode-errorForeground);
            color: white;
        }
        .changes-panel .panel-actions .btn-refresh {
            background: var(--vscode-button-secondaryBackground);
            color: var(--vscode-button-secondaryForeground);
        }
        .change-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
            margin-bottom: 2px;
        }
        .change-item:hover {
            background: var(--vscode-list-hoverBackground);
        }
        .change-item .change-icon {
            font-size: 14px;
        }
        .change-item .change-type {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 8px;
            font-weight: 500;
        }
        .change-item .change-type.create {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }
        .change-item .change-type.modify {
            background: rgba(52, 152, 219, 0.2);
            color: #3498db;
        }
        .change-item .change-type.delete {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }
        .change-item .change-file {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 12px;
        }
        .change-item .change-status {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 8px;
        }
        .change-item .change-status.pending {
            background: var(--vscode-badge-background);
            color: var(--vscode-badge-foreground);
        }
        .change-item .change-status.applied {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }
        .change-item .change-status.rejected {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }
        .change-item .change-actions {
            display: flex;
            gap: 2px;
        }
        .change-item .change-actions button {
            padding: 0 4px;
            font-size: 10px;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            background: none;
        }
        .change-item .change-actions .accept-btn {
            color: #2ecc71;
        }
        .change-item .change-actions .accept-btn:hover {
            background: rgba(46, 204, 113, 0.2);
        }
        .change-item .change-actions .reject-btn {
            color: #e74c3c;
        }
        .change-item .change-actions .reject-btn:hover {
            background: rgba(231, 76, 60, 0.2);
        }
        .change-item .change-actions .diff-btn {
            color: var(--vscode-descriptionForeground);
        }
        .change-item .change-actions .diff-btn:hover {
            background: var(--vscode-list-hoverBackground);
        }

        /* 状态栏中的修改指示器 */
        .status-bar .change-indicator {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 3px;
        }
        .status-bar .change-indicator:hover {
            background: var(--vscode-list-hoverBackground);
        }
        .status-bar .change-indicator .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f39c12;
            animation: pulse-dot 1.5s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .status-bar .change-indicator .count {
            font-weight: 600;
        }

        /* 空状态 */
        .changes-empty {
            text-align: center;
            padding: 20px;
            color: var(--vscode-descriptionForeground);
            font-size: 12px;
        }

        /* 工具调用中的 diff 按钮 */
        .tool-call .diff-btn {
            padding: 1px 8px;
            font-size: 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            background: var(--vscode-button-secondaryBackground);
            color: var(--vscode-button-secondaryForeground);
            margin-left: 4px;
        }
        .tool-call .diff-btn:hover {
            background: var(--vscode-button-secondaryHoverBackground);
        }

    </style>
</head>
<body>
    <div class="agent-selector">
        <label>选择 Agent 配置:</label>
        <select id="agentSelect">
            <option value="qwen-agent">qwen-agent</option>
            </select>
     </div>
    <div class="toolbar">
        <button id="startBtn">▶ Start</button>
        <button id="stopBtn">⏹ Stop</button>
        <button id="clearBtn">🗑 Clear</button>
        <button id="showChangesBtn" style="display:none;">📝 待确认修改</button>
    </div>
    <div class="status-bar">
        <span class="status-dot stopped" id="statusDot"></span>
        <span id="statusText">Agent not started</span>
        <!-- ⭐ 新增：修改指示器 -->
        <div class="change-indicator" id="changeIndicator" style="display:none;">
            <span class="dot"></span>
            <span class="count" id="changeCount">0</span>
            <span>待确认修改</span>
        </div>
    </div>

    <!-- 会话管理器 -->
    <div class="session-manager">
        <div class="session-header" id="sessionHeader">
            <span class="toggle-icon" id="sessionToggle">▼</span>
            <h3>💬 会话</h3>
            <span class="session-count" id="sessionCount">0</span>
            <div class="session-actions">
                <button id="newSessionBtn" title="创建新会话">+ 新建</button>
            </div>
        </div>
        <div class="session-list-wrapper expanded" id="sessionListWrapper">
            <div class="session-list" id="sessionList">
                <div class="session-empty">加载中...</div>
            </div>
        </div>
    </div>
    <div class="messages" id="messages"></div>
    
    <!-- ⭐ 新增：修改管理面板 -->
    <div class="changes-panel" id="changesPanel">
        <div class="panel-header">
            <h4>📝 待确认的修改</h4>
            <div class="panel-actions">
                <button class="btn-commit-all" id="commitAllBtn">✅ 全部提交</button>
                <button class="btn-rollback-all" id="rollbackAllBtn">❌ 全部放弃</button>
                <button class="btn-refresh" id="refreshChangesBtn">🔄 刷新</button>
            </div>
        </div>
        <div id="changesList">
            <div class="changes-empty">没有待确认的修改</div>
        </div>
    </div>

    <div class="input-container">
        <textarea id="input" rows="2" placeholder="Type message... (Enter to send)" disabled></textarea>
        <button id="sendBtn" disabled>Send</button>
    </div>
    <!-- <script src="chat-view.js"></script> -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
